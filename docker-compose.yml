services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opcp-serverless-brik-app-${USER_ID:-0}-${HTTP_PORT:-8080}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      - RUNTIME=docker
      - RUNTIME_SOCKET=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: opcp-serverless-brik-nginx-${USER_ID:-0}-${HTTPS_PORT:-5001}
    ports:
      - "${HTTPS_PORT:-5001}:443"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./skillhub:/var/www/html:rw
    depends_on:
      - app
    restart: unless-stopped
    environment:
      - HTTPS_PORT=${HTTPS_PORT:-5001}

volumes:
  app_data:
    driver: local